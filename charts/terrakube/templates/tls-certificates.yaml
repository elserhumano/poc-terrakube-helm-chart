---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: terrakube-ca
  namespace: terrakube
spec:
  isCA: true
  commonName: terrakube-ca
  secretName: terrakube-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: terrakube-ca-issuer
  namespace: terrakube
spec:
  ca:
    secretName: terrakube-ca-secret
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: terrakube-tls
  namespace: terrakube
spec:
  secretName: terrakube-tls-secret
  duration: 8760h
  renewBefore: 720h
  commonName: terrakube-api.local
  dnsNames:
  - terrakube-ui.local
  - terrakube-api.local
  - terrakube-reg.local
  issuerRef:
    name: terrakube-ca-issuer
    kind: Issuer
    group: cert-manager.io
