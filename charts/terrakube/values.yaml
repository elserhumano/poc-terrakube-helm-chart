    secretName: terrakube-executor-secrets
  secrets:
   - terrakube-api-secrets
  configMaps:
   - terrakube-api-config
  resources: {}
  podLabels: {}
  podAnnotations: {}
  defaultDatabase: true
  defaultRedis: true
  loadSampleData: true
  terraformReleasesUrl: "https://releases.hashicorp.com/terraform/index.json"
  tofuReleasesUrl: "https://api.github.com/repos/opentofu/opentofu/releases"
  securityContext: {}
  containerSecurityContext: {}
  imagePullSecrets: []
  initContainers: []
  startupProbe:
    initialDelaySeconds: 30
    failureThreshold: 30
    periodSeconds: 5
  readinessProbe:
    periodSeconds: 10
  livenessProbe:
    periodSeconds: 10
  cache:
    moduleCacheMaxTotal: "128"
    moduleCacheMaxIdle: "128"
    moduleCacheMinIdle: "64"
    moduleCacheTimeout: "600000"
    moduleCacheSchedule: "0 */3 * ? * *"
  properties:
    databaseType: "POSTGRESQL"
    databaseHostname: ""
    databaseName: ""
    databaseUser: ""
    databaseSchema: "public"
    databasePassword: ""
    databaseSslMode: "disable"
    databasePort: "5432"
    redisHostname: ""
    redisPassword: ""
