## =============================================================
## Terrakube Helm Chart — values.yaml para K3s con Traefik
## IP de la VM: 192.168.167.40  |  dominio: .local
## Ingress: Traefik nativo de K3s (NO nginx)
## TLS: deshabilitado (consistentemente) para el POC
##
## ANTES DE INSTALAR:
##   1. Agregar en /etc/hosts de la VM Y de Windows:
##        192.168.167.40  terrakube-ui.local
##        192.168.167.40  terrakube-api.local
##        192.168.167.40  terrakube-reg.local
##
##   2. Verificar que Traefik tenga EXTERNAL-IP asignada:
##        kubectl get svc -n kube-system traefik
##      Si está en <pending>:
##        kubectl patch svc traefik -n kube-system \
##          -p '{"spec":{"externalIPs":["192.168.167.40"]}}'
##
##   3. Crear namespace:
##        kubectl create namespace terrakube
##
##   4. Instalar:
##        helm install --debug --values values-terrakube-k3s.yaml \
##          terrakube terrakube-repo/terrakube -n terrakube
## =============================================================

