## ---------------------------------------------------------------
## OpenLDAP
## ---------------------------------------------------------------
openldap:
  adminUser: "admin"
  adminPass: "admin"
  baseRoot: "dc=example,dc=org"
  image: "bitnamilegacy/openldap"
  version: "latest"
  imagePullSecrets: []
  initContainers: []
  podLabels: {}
  podAnnotations: {}
  securityContext: {}
  containerSecurityContext: {}
  revisionHistoryLimit: 3

## ---------------------------------------------------------------
## DEX — OIDC broker
##
## CRITICO: issuer y redirectURIs deben ser http:// (sin TLS)
## y deben coincidir exactamente con los dominios del ingress.
## Si hay cualquier mezcla http/https el browser bloquea el login.
## ---------------------------------------------------------------
dex:
  enabled: true
  existingSecret: false
  revisionHistoryLimit: 3
  config:
    issuer: https://terrakube-api.local/dex

    storage:
      type: memory

    web:
      http: 0.0.0.0:5556
      allowedOrigins: ['*']

    oauth2:
      responseTypes: ["code", "token", "id_token"]
      skipApprovalScreen: true

    connectors:
    - type: ldap
      name: OpenLDAP
      id: ldap
      config:
        host: terrakube-openldap-service:1389
        insecureNoSSL: true
        bindDN: cn=admin,dc=example,dc=org
        bindPW: admin
        usernamePrompt: Email Address

        userSearch:
          baseDN: ou=users,dc=example,dc=org
          filter: "(objectClass=person)"
          username: mail
          idAttr: DN
          emailAttr: mail
          nameAttr: cn

        groupSearch:
          baseDN: ou=Groups,dc=example,dc=org
          filter: "(objectClass=groupOfNames)"
          userMatchers:
          - userAttr: DN
            groupAttr: member
          nameAttr: cn

    staticClients:
    - id: example-app
      redirectURIs:
      - 'https://terrakube-ui.local'
      - '/device/callback'
      - 'http://localhost:10000/login'
      - 'http://localhost:10001/login'
      name: 'example-app'
      public: true

  ## Nota: el volumen gcp-credentials solo es necesario si usas
  ## Google Identity. Con OpenLDAP puro no hace falta.
  ## Lo dejamos comentado para no causar errores si el secret no existe.
  # volumes:
  # - name: gcp-credentials
  #   secret:
  #     secretName: terrakube-dex-secrets
  #     items:
  #     - key: "gcp-credentials"
  #       path: "gcp-credentials"
  # volumeMount:
  # - name: gcp-credentials
  #   mountPath: /etc/gcp/secret
  #   readOnly: true

