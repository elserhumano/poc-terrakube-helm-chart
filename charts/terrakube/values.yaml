## ---------------------------------------------------------------
## Ingress — Traefik nativo de K3s, TODO en HTTP (sin TLS)
##
## POR QUE ingressClassName: "traefik" y NO "nginx":
##   K3s incluye Traefik por defecto. Usar nginx requeriría instalar
##   nginx-ingress controller por separado. Para el POC, Traefik es
##   suficiente con controller: "generic" y sin annotations nginx.
##
## POR QUE useTls: false en TODOS:
##   Mezclar TLS en UI (true) con API sin TLS (false) causa
##   Mixed Content errors en el browser que bloquean el login OAuth2.
##   Para el POC, todo HTTP es lo correcto. Agregar TLS después,
##   cuando el flujo de login esté validado.
##
## POR QUE NO hay annotations nginx.ingress.kubernetes.io/*:
##   Traefik ignora esas annotations. No causan error pero tampoco
##   funcionan. Se dejan comentadas para referencia futura si
##   se migra a nginx.
## ---------------------------------------------------------------
ingress:
  ## CRITICO: false — no hay TLS en ningún servicio para el POC
  useTls: true
  includeTlsHosts: true
  controller: "generic"

  gatewayapi:
    apiVersion: v1beta1
    enabled: false
    gateways: []
    annotations: {}

  ui:
    enabled: true
    domain: "terrakube-ui.local"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    useTls: true
    tlsSecretName: terrakube-tls-secret
    annotations: {}

  api:
    enabled: true
    domain: "terrakube-api.local"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    useTls: true
    tlsSecretName: terrakube-tls-secret
    annotations: {}

  registry:
    enabled: true
    domain: "terrakube-reg.local"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    useTls: true
    tlsSecretName: terrakube-tls-secret
    annotations: {}

  dex:
    enabled: true
    path: "/dex/"
    pathType: "Prefix"
    annotations: {}

  executor:
    enabled: false
    domain: "terrakube-executor.local"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "traefik"
    useTls: true
    annotations: {}

  ## AWS — deshabilitado para K3s
  aws:
    enabled: false
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}, {"HTTP":80}]'
      alb.ingress.kubernetes.io/ssl-redirect: '443'
    certificateArn: ""
    targetGroupBinding:
      create: false
      apiTargetGroupARN: ""
      uiTargetGroupARN: ""
      registryTargetGroupARN: ""
    sharedLoadBalancer:
      enabled: false
      groupName: ""
    securityGroups: []
    subnets: []

  ## GKE — deshabilitado para K3s
  gke:
    enabled: false
    annotations:
      kubernetes.io/ingress.class: gce
    uiStaticIPName: ""
    apiStaticIPName: ""
    registryStaticIPName: ""
    executorStaticIPName: ""
    managedCertificate:
      create: false
    backendConfig:
      create: false
      timeout: 30
      uiSecurityPolicy: ""
      apiSecurityPolicy: ""
      registrySecurityPolicy: ""
      executorSecurityPolicy: ""
    frontendConfig:
      create: false
      redirectToHttps: true
    externalDNS:
      perIngressProxy:
        ui: false
        api: false
        registry: false
        dex: false
        executor: false

## =============================================================
## PROXIMOS PASOS (despues de validar el login):
##
## 1. Agregar TLS con cert-manager + Let's Encrypt (si tenés dominio
##    publico) o con certificados self-signed para lab interno.
##
## 2. Migrar storage de MinIO interno a un bucket S3/Azure/GCP
##    para simular un ambiente mas real.
##
## 3. Configurar un Identity Provider externo (GitHub, Azure AD)
##    en lugar de OpenLDAP, que es solo para testing.
##
## 4. Agregar resources.requests/limits a todos los componentes
##    para simular constraints de produccion en los 16GB de RAM.
## =============================================================
